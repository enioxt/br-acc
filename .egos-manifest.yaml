  - id: neo4j_nodes
    description: "Total nodes in Neo4j graph (running on VPS bracc-neo4j container)"
    readme_location: "README.md §Origem e Diferenças"
    command: |
      ssh -o ConnectTimeout=10 -i ~/.ssh/hetzner_ed25519 root@204.168.217.125 \
        'curl -s -u neo4j:"$(docker exec bracc-neo4j env | grep NEO4J_AUTH | cut -d= -f2 | cut -d/ -f2)" \
        http://localhost:7474/db/neo4j/query/v2 \
        -H "Content-Type: application/json" \
        -d "{\"statement\":\"MATCH (n) RETURN count(n) as nodes\"}"' \
        | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['values'][0][0])"
    tolerance: "min:83000000"
    last_value: "83773683"
    last_verified_at: "2026-04-07"
    category: "entities"
    note: "Captured via VPS Neo4j query 2026-04-07T00:00Z"

  - id: neo4j_relationships
    description: "Total relationships in Neo4j graph"
    readme_location: "README.md §Origem e Diferenças"
    command: |
      ssh -o ConnectTimeout=10 -i ~/.ssh/hetzner_ed25519 root@204.168.217.125 \
        'curl -s -u neo4j:"$(docker exec bracc-neo4j env | grep NEO4J_AUTH | cut -d= -f2 | cut -d/ -f2)" \
        http://localhost:7474/db/neo4j/query/v2 \
        -H "Content-Type: application/json" \
        -d "{\"statement\":\"MATCH ()-[r]->() RETURN count(r) as rels\"}"' \
        | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['values'][0][0])"
    tolerance: "min:26000000"
    last_value: "26808540"
    last_verified_at: "2026-04-07"
    category: "entities"

  - id: neo4j_node_labels
