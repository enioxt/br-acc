    labels_list: ["Person","Partner","Company","Contract","Sanction","PublicOffice","Investigation","Amendment","Health","Finance","Embargo","Education","Convenio","LaborStats","Inquiry","InquiryRequirement","InquirySession","MunicipalBid","MunicipalContract","MunicipalBidItem","MunicipalGazetteAct","JudicialCase","SourceDocument","IngestionRun","TemporalViolation","Election","User","GlobalPEP","PEPRecord","BarredNGO","GovCardExpense","GovTravel"]

