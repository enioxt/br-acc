services:
  neo4j:
    image: neo4j:5-community
    container_name: bracc-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 3G
      NEO4J_dbms_memory_transaction_total_max: 1G
    volumes:
      - neo4j-data:/data
      - ./neo4j/import:/var/lib/neo4j/import
      - ./neo4j/init.cypher:/var/lib/neo4j/init.cypher
    networks:
      - bracc
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - bracc
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    build: ../api
    volumes:
      - ../docs/source_registry_br_v1.csv:/app/docs/source_registry_br_v1.csv:ro
      - /opt/bracc/cnpj-etl.log:/app/cnpj-etl.log:ro
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-bracc-jwt-secret-2026-strong-key-min32chars}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      AI_MODEL: ${AI_MODEL:-google/gemini-2.0-flash-001}
      CORS_ORIGINS: https://${DOMAIN},http://localhost:3000
      ETL_LOG_PATH: /app/cnpj-etl.log
      PORTAL_TRANSPARENCIA_API_KEY: ${PORTAL_TRANSPARENCIA_API_KEY}
      DATAJUD_API_KEY: ${DATAJUD_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      BRACC_SOURCE_REGISTRY_PATH: /app/docs/source_registry_br_v1.csv
      REDIS_URL: redis://redis:6379/0
      PATTERNS_ENABLED: "true"
    networks:
      - bracc
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ../frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - bracc
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    environment:
      DOMAIN: ${DOMAIN:-inteligencia.egos.ia.br}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - bracc
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy

networks:
  bracc:
    driver: bridge

volumes:
  neo4j-data:
  redis-data:
  caddy-data:
  caddy-config:
